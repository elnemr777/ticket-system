<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0f0f14;
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 30% 40%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
            animation: bgMove 15s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .error-code {
            font-size: 12rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            animation: glitch 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translateX(0); }
            92% { transform: translateX(-5px); }
            94% { transform: translateX(5px); }
            96% { transform: translateX(-3px); }
            98% { transform: translateX(3px); }
        }

        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #e5e7eb;
        }

        .error-message {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        .btn-secondary {
            background: #1a1a24;
            border: 1px solid #2d2d44;
            color: #9ca3af;
        }

        .btn-secondary:hover {
            border-color: #00d9ff;
            color: #e5e7eb;
            transform: translateY(-3px);
        }

        @media (max-width: 576px) {
            .error-code {
                font-size: 8rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">🎮</div>
        <div class="error-code">404</div>
        <h1 class="error-title">الصفحة غير موجودة!</h1>
        <p class="error-message">يبدو إنك ضعت في السيرفر! الصفحة اللي بتدور عليها مش موجودة أو تم نقلها.</p>
        <div class="buttons">
            <a href="/backend/ticket-system/pages/main.html" class="btn btn-primary">🏠 الصفحة الرئيسية</a>
            <a href="javascript:history.back()" class="btn btn-secondary">← رجوع</a>
        </div>
    </div>
</body>
</html>
