<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل التذكرة - MTA Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/ticket-details.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <a href="main.html" class="logo-link">
                    <span class="logo-icon">🎮</span>
                    <h1>MTA Support</h1>
                </a>
            </div>
            <div class="header-actions">
                <a href="main.html" class="nav-btn">الرئيسية</a>
                <a href="my-tickets.html" class="nav-btn">تذاكري</a>
                <a href="../auth/logout.php" class="nav-btn logout">خروج</a>
            </div>
        </header>

        <!-- Ticket Info Card -->
        <div class="ticket-info" id="ticketInfo">
            <div class="ticket-info-header">
                <div class="ticket-info-right">
                    <span class="ticket-id" id="ticketId">#0</span>
                    <h2 class="ticket-title" id="ticketTitle">جاري التحميل...</h2>
                </div>
                <span class="badge" id="ticketStatus">---</span>
            </div>

            <p class="ticket-description" id="ticketDescription"></p>

            <div class="ticket-meta-grid">
                <div class="meta-item">
                    <span class="meta-label">القسم</span>
                    <span class="meta-value" id="ticketCategory">---</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">الأولوية</span>
                    <span class="meta-value" id="ticketPriority">---</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">تاريخ الإنشاء</span>
                    <span class="meta-value" id="ticketDate">---</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">الإداري المسؤول</span>
                    <span class="meta-value" id="ticketAdmin">⏳ لم يتم التعيين</span>
                </div>
            </div>
        </div>

        <!-- Chat Box -->
        <div class="chat-box">
            <div class="chat-header">
    <h3>💬 المحادثة</h3>
    <div class="chat-header-actions">
        <span class="messages-count" id="messagesCount">0 رسائل</span>
        <button class="close-ticket-btn" id="closeTicketBtn">🔒 إغلاق التذكرة</button>
    </div>
</div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="chat-loading" id="chatLoading">
                    <div class="spinner-large"></div>
                    <p>جاري تحميل المحادثة...</p>
                </div>
            </div>

            <!-- Message Input -->
            <div class="chat-input" id="chatInput">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">اضغط Enter للإرسال</p>
            </div>

            <!-- Closed State -->
            <div class="chat-closed" id="chatClosed" style="display: none;">
                <p>🔒 هذه التذكرة مغلقة - لا يمكن إضافة ردود جديدة</p>
            </div>
        </div>
    </div>

    <script>
        // جلب ID التذكرة من الرابط
        var urlParams = new URLSearchParams(window.location.search);
        var ticketId = urlParams.get('id');

        if (!ticketId) {
            window.location.href = 'my-tickets.html';
        }

        // تحميل بيانات التذكرة

        // إغلاق التذكرة
document.getElementById('closeTicketBtn').addEventListener('click', async function() {
    if (!confirm('هل أنت متأكد من إغلاق التذكرة؟')) return;

    try {
        var formData = new FormData();
        formData.append('ticket_id', ticketId);

        var response = await fetch('../api/tickets/close.php', {
            method: 'POST',
            body: formData
        });

        var data = await response.json();

        if (data.success) {
            alert('✅ تم إغلاق التذكرة');
            window.location.href = 'my-tickets.html';
        } else {
            alert('❌ حدث خطأ');
        }
    } catch (error) {
        alert('❌ حدث خطأ في الاتصال');
    }
});

        async function loadTicketDetails() {
            try {
                var response = await fetch('../api/tickets/get-ticket.php?id=' + ticketId);
                var data = await response.json();

                if (data.success) {
                    var ticket = data.ticket;

                    // تحديث معلومات التذكرة
                    document.getElementById('ticketId').textContent = '#' + ticket.id;
                    document.getElementById('ticketTitle').textContent = ticket.title;
                    document.getElementById('ticketDescription').textContent = ticket.description;
                    document.getElementById('ticketDate').textContent = formatDate(ticket.created_at);
                    document.getElementById('ticketCategory').textContent = getCategoryText(ticket.category);
                    document.getElementById('ticketAdmin').textContent = ticket.admin_name ? '👤 ' + ticket.admin_name : '⏳ لم يتم التعيين';

                    // الحالة
                    var statusEl = document.getElementById('ticketStatus');
                    statusEl.textContent = getStatusText(ticket.status);
                    statusEl.className = 'badge status-' + ticket.status;

                    // الأولوية
                    var priorityEl = document.getElementById('ticketPriority');
                    priorityEl.textContent = getPriorityText(ticket.priority);
                    priorityEl.className = 'meta-value priority-' + ticket.priority;

                    // لو التذكرة مغلقة
                    if (ticket.status === 'closed') {
    document.getElementById('chatInput').style.display = 'none';
    document.getElementById('chatClosed').style.display = 'block';
    document.getElementById('closeTicketBtn').style.display = 'none'; // 👈 اخفي الزرار
}

                    // تحميل الردود
                    loadReplies(data.replies);

                } else {
                    window.location.href = 'my-tickets.html';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // عرض الردود
        function loadReplies(replies) {
            var chatMessages = document.getElementById('chatMessages');
            var chatLoading = document.getElementById('chatLoading');

            if (chatLoading) chatLoading.style.display = 'none';

            if (!replies || replies.length === 0) {
                chatMessages.innerHTML = '<div class="no-messages"><p>لا توجد رسائل بعد - ابدأ المحادثة!</p></div>';
                document.getElementById('messagesCount').textContent = '0 رسائل';
                return;
            }

            document.getElementById('messagesCount').textContent = replies.length + ' رسائل';

            var html = '';
            for (var i = 0; i < replies.length; i++) {
                var reply = replies[i];
                var isAdmin = reply.role === 'admin';
                var messageClass = isAdmin ? 'message admin' : 'message player';
                var senderName = isAdmin ? '🛡️ ' + reply.username : '🎮 ' + reply.username;

                html += '<div class="' + messageClass + '">' +
                    '<div class="message-header">' +
                        '<span class="sender-name">' + senderName + '</span>' +
                        '<span class="message-time">' + formatDate(reply.created_at) + '</span>' +
                    '</div>' +
                    '<div class="message-body">' + reply.message + '</div>' +
                '</div>';
            }

            chatMessages.innerHTML = html;

            // Scroll لآخر رسالة
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // إرسال رسالة
        async function sendMessage() {
            var input = document.getElementById('messageInput');
            var message = input.value.trim();

            if (!message) return;

            var sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                var formData = new FormData();
                formData.append('ticket_id', ticketId);
                formData.append('message', message);

                var response = await fetch('../api/tickets/reply.php', {
                    method: 'POST',
                    body: formData
                });

                var data = await response.json();

                if (data.success) {
                    input.value = '';
                    input.style.height = 'auto';
                    loadTicketDetails(); // إعادة تحميل الردود
                } else {
                    alert('❌ حدث خطأ في إرسال الرسالة');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ حدث خطأ في الاتصال');
            }

            sendBtn.disabled = false;
        }

        // زرار الإرسال
        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        // Enter للإرسال
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Helper functions
        function getStatusText(status) {
            var statuses = {
                'open': '🟡 مفتوحة',
                'progress': '🔵 قيد المعالجة',
                'resolved': '🟢 تم الحل',
                'closed': '⚫ مغلقة'
            };
            return statuses[status] || status;
        }

        function getPriorityText(priority) {
            var priorities = {
                'low': '⚪ عادي',
                'medium': '🟡 مهم',
                'high': '🔴 عاجل'
            };
            return priorities[priority] || priority;
        }

        function getCategoryText(category) {
            var categories = {
                'technical': '🔧 مشكلة تقنية',
                'ban': '🚫 طلب فك باند',
                'recovery': '🔑 استرجاع حساب',
                'complaint': '📢 شكوى على لاعب',
                'bug': '🐛 بلاغ عن Bug',
                'suggestion': '💡 اقتراح',
                'other': '📌 أخرى'
            };
            return categories[category] || category;
        }

        function formatDate(dateStr) {
            var date = new Date(dateStr);
            var day = date.getDate();
            var month = date.getMonth() + 1;
            var year = date.getFullYear();
            var hours = date.getHours();
            var minutes = date.getMinutes();
            if (minutes < 10) minutes = '0' + minutes;
            return day + '/' + month + '/' + year + ' - ' + hours + ':' + minutes;
        }

        // تحميل البيانات
        loadTicketDetails();
    </script>
</body>
</html>
